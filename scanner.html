<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Сканер | Сміла</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; }
        /* Інтерфейс поверх камери */
        .ui-panel {
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.7); 
            backdrop-filter: blur(10px);
            color: white; 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center;
            width: 90%; 
            max-width: 400px; 
            z-index: 999; 
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn-back {
            background: #4da8da; 
            color: white; 
            border: none; 
            padding: 12px 20px;
            border-radius: 12px; 
            margin-top: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            text-decoration: none; 
            display: inline-block;
            transition: transform 0.2s;
            width: 100%;
        }
        .btn-back:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="ui-panel">
        <h3 style="margin:0 0 10px 0;">AR Сканер 📷</h3>
        <p style="margin:0; font-size: 0.95rem; line-height: 1.4;">
            Наведіть камеру на чорно-білий маркер біля пам'ятки, щоб побачити 3D проекцію.
        </p>
        <a href="index.html" class="btn-back">🔙 Повернутися до путівника</a>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-marker preset="hiro">
            <a-box position="0 0.5 0" material="color: #4da8da; opacity: 0.8; transparent: true;">
                <a-animation attribute="rotation" dur="3000" to="360 360 0" repeat="indefinite" easing="linear"></a-animation>
            </a-box>
            <a-text value="Сміла 3D" position="-0.8 1.5 0" color="#ffffff" scale="1.5 1.5 1.5"></a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
