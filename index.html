<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Відкрий Смілу 🗺️ | Туристичний портал</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-wrapper"></div>

    <header class="glass-panel">
        <h1>Сміла в смартфоні 📱</h1>
        <p>Ваш інтерактивний 3D-путівник містом</p>
    </header>

    <main>
        <section class="search-section glass-panel">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Пошук: озеро, гармата, Бобринський...">
            <div class="categories" id="filterButtons">
                <span data-filter="all" class="active">🌐 Всі</span>
                <span data-filter="monument">🏛️ Пам'ятки</span>
                <span data-filter="history">📜 Історія</span>
                <span data-filter="nature">🌳 Природа</span>
                <span data-filter="sport">⚽ Спорт</span>
                <span data-filter="transport">🚌 Транспорт</span>
            </div>
        </section>

        <section id="landmarks-container" class="landmarks-grid">
            </section>
    </main>

    <footer class="glass-panel footer">
        <div class="support">
            <p>🐈 Підтримка проєкту:</p>
            <a href="https://send.monobank.ua/jar/AJjYbkZ5Bb" target="_blank" class="btn mono-btn">Банка Monobank</a>
        </div>
        <div class="contacts">
            <p>Зв'язок з розробником:</p>
            <a href="https://t.me/flame4ost" target="_blank">💬 t.me/flame4ost</a><br>
            <a href="mailto:flame4ost@protonmail.com">✉️ flame4ost@protonmail.com</a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
